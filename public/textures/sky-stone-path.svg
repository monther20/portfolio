<svg xmlns="http://www.w3.org/2000/svg" width="768" height="1536" viewBox="0 0 768 1536">
  <defs>
    <filter id="roughen" x="-6%" y="-6%" width="112%" height="112%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="3" seed="17" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="5" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <style>
      .stone{fill:#f7f7f2;stroke:#171717;stroke-width:7;stroke-linecap:round;stroke-linejoin:round;filter:url(#roughen)}
      .inner{fill:none;stroke:#333;stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round;opacity:.48}
      .hatch{fill:none;stroke:#111;stroke-width:2;stroke-linecap:round;opacity:.18}
      .chip{fill:#ededE8;stroke:#171717;stroke-width:4;stroke-linecap:round;stroke-linejoin:round;filter:url(#roughen);opacity:.95}
      .shadow{fill:#000;opacity:.08;filter:url(#roughen)}
    </style>
  </defs>

